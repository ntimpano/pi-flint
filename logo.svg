<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" fill="#0a0a0f" rx="12"/>
  <g filter="url(#glow)" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- spark shape -->
    <path d="M60 18 L48 52 L34 52 L52 72 L42 102 L72 62 L84 62 L68 46 L78 18 Z" fill="#00d4ff" fill-opacity="0.08" stroke-width="1.5"/>
    <!-- inner accent lines -->
    <line x1="60" y1="30" x2="56" y2="48" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="72" y1="28" x2="68" y2="44" stroke-width="1" stroke-opacity="0.5"/>
    <!-- circuit dots -->
    <circle cx="60" cy="18" r="2" fill="#00d4ff" stroke="none"/>
    <circle cx="42" cy="102" r="2" fill="#00d4ff" stroke="none"/>
  </g>
  <!-- text -->
  <text x="60" y="116" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4ff" letter-spacing="4" opacity="0.7">FLINT</text>
</svg>
